<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة زوامل القبيصي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #ff9800; }
        audio { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .list-item { background: #2c2c2c; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .list-item:hover { background: #ff9800; color: #000; transform: scale(1.02); }
        .icon { margin-left: 15px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>مكتبة القبيصي</h1>
        <audio id="player" controls></audio>
        
        <div class="list-item" onclick="document.getElementById('player').src='ZAMIL%20(2).mp3'; document.getElementById('player').play();">
            <span class="icon">🎵</span> الزامل الثاني
        </div>
        <div class="list-item" onclick="document.getElementById('player').src='ZAMIL%20(3).mp3'; document.getElementById('player').play();">
            <span class="icon">🎵</span> الزامل الثالث
        </div>
        <div class="list-item" onclick="document.getElementById('player').src='ZAMIL%20(4).mp3'; document.getElementById('player').play();">
            <span class="icon">🎵</span> الزامل الرابع
        </div>
        <div class="list-item" onclick="document.getElementById('player').src='ZAMIL%20(5).mp3'; document.getElementById('player').play();">
            <span class="icon">🎵</span> الزامل الخامس
        </div>
    </div>
</body>
</html>
